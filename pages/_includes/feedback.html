<section aria-label="feedback" class="section-understated">
  <div class="container py-4 pb-5">
    <div class="col-lg-6">
      <form class="feedback-form" id="pageFeedback">
        <input
          type="button"
          hidden=""
          data-sitekey="6Ld_Q5gsAAAAAPQxbJxSIq9sNhA3QZtm2XwRGxeQ"
          class="g-recaptcha" />
        <div class="js-feedback-form">
          <h2 class="h3 mt-2 font-size-25" id="feedback-rating">
            Did you find what you were looking for?
          </h2>
          <label
            class="btn btn-outline-primary btn-lg rounded py-0 px-0 d-inline-block me-3 js-feedback-yes">
            <input
              class="hidden-up pos-abs top-0 left-0"
              name="helpful"
              type="radio"
              value="Yes" />
            <span
              class="btn btn-lg btn-block py-3 rounded color-primary color-primary-hover font-weight-600 bg-gray-75-hover"
              >Yes</span
            >
          </label>

          <label
            class="btn btn-outline-primary btn-lg rounded py-0 px-0 d-inline-block me-3 js-feedback-no">
            <input
              class="hidden-up pos-abs top-0 left-0"
              name="helpful"
              type="radio"
              value="No" />
            <span
              class="btn btn-lg btn-block py-3 rounded color-primary color-primary-hover font-weight-600 bg-gray-75-hover"
              >No</span
            >
          </label>
        </div>

        <div class="js-feedback-thanks h4 mt-3 mb-3 d-none" role="alert">
          Thank you for your feedback! Your feedback was submitted successfully!
        </div>

        <div class="feedback-form-add d-none">
          <label class="js-feedback-field-label h4 mt-3 mb-3" for="add-feedback"
            >Great! What were you looking for today?</label
          >
          <div class="py-2">
            <textarea
              name="comments"
              class="js-add-feedback w-100 p-2 height-150"
              id="add-feedback"
              rows="1"></textarea>
            <button
              class="js-feedback-submit btn btn-outline-primary btn-lg rounded py-3 mt-2 d-block"
              type="submit"
              id="feedback-submit">
              Submit
            </button>
          </div>
        </div>

        <div class="feedback-thanks-add py-3 d-none h4" role="alert">
          Your feedback was submitted successfully! Thank you for your comments.
        </div>

        <div class="js-feedback-error h4 mt-3 mb-3 d-none" role="alert">
          Sorry, there was an error submitting your feedback.

          <p class="js-error-console mt-5 font-size-12 font-weight-400"></p>
        </div>
      </form>
    </div>
  </div>
</section>
